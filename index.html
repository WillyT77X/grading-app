<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Competency Grading</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f4f6f8;
    margin:20px;
}

h1{margin-bottom:10px;}

.comp{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns: 1.6fr auto auto 1.3fr;
    gap:16px;
    align-items:center;
}

.header{
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
    margin-bottom:10px;
}

.row{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.row:last-child{border-bottom:none;}

.row.lte{ background:#fff3cd; }
.row.dte{ background:#f8d7da; }

textarea{
    width:100%;
    min-height:40px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.rootNote{
    display:none;
    font-size:13px;
    font-weight:bold;
    color:#b30000;
    margin-top:4px;
}

input[type="radio"]{
    transform:scale(1.1);
    margin-right:4px;
}

.compFooter{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.compGrade{
    font-weight:bold;
}

.clearBtn{
    padding:6px 14px;
    border-radius:6px;
    border:1px solid #ccc;
    background:#f1f1f1;
    cursor:pointer;
}

.overall{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

.pass{color:green;}
.fail{color:#b30000;}
.orange{color:#cc5500;}
.red{color:#b30000;}
</style>
</head>
<body>

<h1>Professional Competency Grading</h1>

<div id="competencies"></div>

<div class="overall">
Overall Grade: <span id="overallGrade">—</span><br>
Result: <span id="result">—</span>
</div>

<script>

const competencies = [

{
title:'1. Application of Procedures',
obs:[
'OB 1.1 Identifies where to find procedures and regulations',
'OB 1.2 Applies relevant operating instructions, procedures and techniques in a timely manner',
'OB 1.3 Follows SOPs unless a higher degree of safety dictates deviation',
'OB 1.4 Operates aeroplane systems and associated equipment correctly',
'OB 1.5 Monitors aircraft systems status',
'OB 1.6 Complies with applicable regulations'
]
},

{
title:'2. Communication',
obs:[
'OB 2.1 Communicates clearly and concisely',
'OB 2.2 Uses standard phraseology',
'OB 2.3 Actively listens and responds appropriately',
'OB 2.4 Confirms understanding through readbacks'
]
},

{
title:'3. Aircraft Flight Path Management – Manual Control',
obs:[
'OB 3.1 Controls aircraft manually within tolerances',
'OB 3.2 Maintains situational awareness during manual flight',
'OB 3.3 Applies appropriate manual control techniques'
]
},

{
title:'4. Aircraft Flight Path Management – Automation',
obs:[
'OB 4.1 Manages automation effectively',
'OB 4.2 Selects appropriate level of automation',
'OB 4.3 Monitors automation and intervenes when required'
]
},

{
title:'5. Leadership and Teamwork',
obs:[
'OB 5.1 Demonstrates leadership when appropriate',
'OB 5.2 Encourages participation and teamwork',
'OB 5.3 Manages workload distribution',
'OB 5.4 Supports and monitors other crew members'
]
},

{
title:'6. Problem Solving and Decision Making',
obs:[
'OB 6.1 Identifies problems promptly',
'OB 6.2 Gathers relevant information',
'OB 6.3 Evaluates options logically',
'OB 6.4 Makes timely decisions',
'OB 6.5 Reviews outcomes of decisions'
]
},

{
title:'7. Situational Awareness',
obs:[
'OB 7.1 Maintains awareness of aircraft state',
'OB 7.2 Anticipates future states and threats',
'OB 7.3 Recognises deviations promptly'
]
},

{
title:'8. Workload Management',
obs:[
'OB 8.1 Prioritises tasks effectively',
'OB 8.2 Manages time appropriately',
'OB 8.3 Avoids fixation',
'OB 8.4 Uses available resources efficiently'
]
},

{
title:'9. Knowledge',
obs:[
'OB 9.1 Demonstrates practical knowledge',
'OB 9.2 Demonstrates systems knowledge',
'OB 9.3 Demonstrates procedural knowledge',
'OB 9.4 Demonstrates regulatory knowledge'
]
}

];

function createWeights(n){
let arr=[];
for(let i=n;i>0;i--) arr.push(i);
return arr;
}

function build(){
const container=document.getElementById("competencies");

competencies.forEach((comp,index)=>{
const weights=createWeights(comp.obs.length);

let block=`<div class="comp">
<h2>${comp.title}</h2>

<div class="grid header">
<div>Observable Behaviour</div>
<div>Grade (– / 0 / + / NA)</div>
<div>Outcome (5–1)</div>
<div>Comments</div>
</div>`;

comp.obs.forEach((text,i)=>{
block+=`
<div class="row" data-weight="${weights[i]}">
<div class="grid">

<div>${text}</div>

<div>
<label><input type="radio" name="grade_${index}_${i}" value="1" class="grade">–</label>
<label><input type="radio" name="grade_${index}_${i}" value="3" class="grade">0</label>
<label><input type="radio" name="grade_${index}_${i}" value="5" class="grade">+</label>
<label><input type="radio" name="grade_${index}_${i}" value="0" class="grade">NA</label>
</div>

<div>
<label><input type="radio" name="out_${index}_${i}" value="5" class="out">5</label>
<label><input type="radio" name="out_${index}_${i}" value="4" class="out">4</label>
<label><input type="radio" name="out_${index}_${i}" value="3" class="out">3</label>
<label><input type="radio" name="out_${index}_${i}" value="2" class="out">2</label>
<label><input type="radio" name="out_${index}_${i}" value="1" class="out">1</label>
</div>

<div>
<textarea></textarea>
<div class="rootNote">Root cause required for LTE/DTE</div>
</div>

</div>
</div>`;
});

block+=`
<div class="compFooter">
<div class="compGrade">Competency Grade: <span id="compGrade_${index}">—</span></div>
<button class="clearBtn" onclick="clearComp(this)">Clear Competency</button>
</div>
</div>`;

container.innerHTML+=block;
});
}

function calculate(){

let overall=document.getElementById("overallGrade");
let result=document.getElementById("result");

let overrideLevel=null;
let compGrades=[];

document.querySelectorAll(".row").forEach(row=>{
row.classList.remove("lte","dte");
let outcome=row.querySelector(".out:checked");
let rootNote=row.querySelector(".rootNote");
rootNote.style.display="none";

if(outcome){
let val=parseInt(outcome.value);
if(val==2){
row.classList.add("lte");
rootNote.style.display="block";
overrideLevel=overrideLevel===1?1:2;
}
if(val==1){
row.classList.add("dte");
rootNote.style.display="block";
overrideLevel=1;
}
}
});

if(overrideLevel){
overall.textContent=overrideLevel;
overall.className=overrideLevel==1?"red":"orange";
result.textContent="FAIL";
result.className="fail";
return;
}

document.querySelectorAll(".comp").forEach((comp,ci)=>{
let total=0;
let weightTotal=0;

comp.querySelectorAll(".row").forEach(row=>{
let weight=parseFloat(row.dataset.weight);
let grade=row.querySelector(".grade:checked");
if(grade && grade.value!="0"){
total+=parseInt(grade.value)*weight;
weightTotal+=weight;
}
});

if(weightTotal){
let avg=Math.round(total/weightTotal);
document.getElementById("compGrade_"+ci).textContent=avg;
compGrades.push(avg);
}else{
document.getElementById("compGrade_"+ci).textContent="—";
}
});

if(compGrades.length){
let avg=Math.round(compGrades.reduce((a,b)=>a+b)/compGrades.length);
overall.textContent=avg;
if(avg>=3){
result.textContent="PASS";
result.className="pass";
}else{
result.textContent="FAIL";
result.className="fail";
}
}else{
overall.textContent="—";
result.textContent="—";
}
}

function clearComp(btn){
let comp=btn.closest(".comp");
comp.querySelectorAll("input[type='radio']").forEach(r=>r.checked=false);
comp.querySelectorAll("textarea").forEach(t=>t.value="");
comp.querySelectorAll(".row").forEach(r=>{
r.classList.remove("lte","dte");
r.querySelector(".rootNote").style.display="none";
});
calculate();
}

document.addEventListener("change",calculate);
build();

</script>
</body>
</html>
