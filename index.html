<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competency Grading</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f4f6f8;
    margin:20px;
}

.comp{
    background:#fff;
    padding:18px;
    border-radius:10px;
}

.row{
    border-bottom:1px solid #eee;
    padding:12px 0;
}

.grid{
    display:grid;
    grid-template-columns: 2fr 1fr 1fr 1.5fr;
    gap:10px;
    align-items:center;
}

.header{
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:6px;
    margin-bottom:10px;
}

textarea{
    width:100%;
    min-height:40px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.root{
    display:none;
    margin-top:6px;
}

input[type="radio"]{
    transform:scale(1.2);
    margin-right:4px;
}

.override{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-weight:600;
    margin-bottom:15px;
    display:none;
}

.overall{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.red{color:#b30000;}
.orange{color:#cc5500;}

</style>
</head>
<body>

<h2>Grading App</h2>

<div id="override" class="override"></div>

<div class="comp">
<h3>Application of Procedures</h3>

<div class="grid header">
<div>Observable Behaviour</div>
<div>Grade</div>
<div>Outcome</div>
<div>Comments</div>
</div>

<div class="row" data-weight="7">

<div class="grid">
<div>OB 1.1 Identifies procedures</div>

<div>
<label><input type="radio" name="perf1" value="1" class="perf">–</label>
<label><input type="radio" name="perf1" value="3" class="perf">0</label>
<label><input type="radio" name="perf1" value="5" class="perf">+</label>
<label><input type="radio" name="perf1" value="0" class="perf">NA</label>
</div>

<div>
<label><input type="radio" name="sev1" value="5" class="sev">5</label>
<label><input type="radio" name="sev1" value="4" class="sev">4</label>
<label><input type="radio" name="sev1" value="3" class="sev">3</label>
<label><input type="radio" name="sev1" value="2" class="sev">2</label>
<label><input type="radio" name="sev1" value="1" class="sev">1</label>
</div>

<div>
<textarea placeholder="Comment..."></textarea>
</div>
</div>

<div class="root">
<textarea placeholder="Root cause required for LTE or DTE"></textarea>
</div>

</div>

</div>

<div class="overall">
Overall Grade: <span id="overallGrade">—</span>
</div>

<script>

function band(avg){
if(avg<=1.5) return 1;
if(avg<=2.5) return 2;
if(avg<=3.5) return 3;
if(avg<=4.5) return 4;
return 5;
}

function calculate(){

const override=document.getElementById("override");
const overall=document.getElementById("overallGrade");

const severities=Array.from(document.querySelectorAll(".sev:checked"))
.map(el=>parseInt(el.value));

if(severities.length){
let lowest=Math.min(...severities);

if(lowest===1){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to DTE";
overall.textContent="DTE";
overall.className="red";
return;
}
if(lowest===2){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to LTE";
overall.textContent="LTE";
overall.className="orange";
return;
}
}

override.style.display="none";
overall.className="";

let total=0, weightTotal=0;

document.querySelectorAll(".row").forEach(row=>{
let weight=parseFloat(row.dataset.weight);
let perf=row.querySelector(".perf:checked");
if(perf && perf.value!=="0"){
total+=parseInt(perf.value)*weight;
weightTotal+=weight;
}
});

if(weightTotal){
overall.textContent=band(total/weightTotal);
}else{
overall.textContent="—";
}
}

document.addEventListener("change",function(e){

if(e.target.classList.contains("sev")){
let row=e.target.closest(".row");
let root=row.querySelector(".root");
if(parseInt(e.target.value)<=2){
root.style.display="block";
}else{
root.style.display="none";
}
}

calculate();
});

</script>

</body>
</html>
