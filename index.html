<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competency Grading</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f4f6f8;
    margin:20px;
}

h2{margin-bottom:20px;}

.comp{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr auto auto 1.4fr;
    gap:18px;
    align-items:start;
}

.grid > div:first-child{
    white-space: normal;
    word-break: break-word;
}

.header{
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
    margin-bottom:12px;
}

.row{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.row:last-child{border-bottom:none;}

textarea{
    width:100%;
    min-height:44px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.root{
    display:none;
    margin-top:8px;
}

input[type="radio"]{
    transform:scale(1.15);
    margin-right:4px;
}

.override{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-weight:600;
    margin-bottom:20px;
    display:none;
}

.grade-line{
    font-weight:bold;
    margin-top:15px;
}

.overall{
    font-size:24px;
    font-weight:bold;
    margin-top:30px;
}

.red{color:#b30000;}
.orange{color:#cc5500;}
</style>
</head>
<body>

<h2>Competency Grading</h2>

<div id="override" class="override"></div>
<div id="competencies"></div>

<div class="overall">
Overall Grade: <span id="overallGrade">—</span>
</div>

<script>

const competencies = [
{
title:"Application of Procedures",
obs:[
"Identifies where to find procedures and regulations",
"Applies relevant operating instructions correctly",
"Follows SOPs unless safety dictates deviation",
"Operates aircraft systems correctly",
"Monitors aircraft systems effectively",
"Complies with regulations",
"Applies procedural knowledge under workload"
]
},
{
title:"Communication",
obs:[
"Determines recipient readiness",
"Selects appropriate communication method",
"Conveys messages clearly and concisely",
"Confirms understanding",
"Listens actively",
"Uses escalation appropriately"
]
}
];

function createWeights(n){
    let arr=[];
    for(let i=n;i>0;i--) arr.push(i);
    return arr;
}

function band(avg){
if(avg<=1.5) return 1;
if(avg<=2.5) return 2;
if(avg<=3.5) return 3;
if(avg<=4.5) return 4;
return 5;
}

function build(){

const container=document.getElementById("competencies");

competencies.forEach((comp,index)=>{

const weights=createWeights(comp.obs.length);

let block=`
<div class="comp" data-comp="${index}">
<h3>${comp.title}</h3>

<div class="grid header">
<div>Observable Behaviour</div>
<div>Grade</div>
<div>Outcome</div>
<div>Comments</div>
</div>
`;

comp.obs.forEach((text,i)=>{

block+=`
<div class="row" data-weight="${weights[i]}">

<div class="grid">

<div>${text}</div>

<div>
<label><input type="radio" name="perf_${index}_${i}" value="1" class="perf">–</label>
<label><input type="radio" name="perf_${index}_${i}" value="3" class="perf">0</label>
<label><input type="radio" name="perf_${index}_${i}" value="5" class="perf">+</label>
<label><input type="radio" name="perf_${index}_${i}" value="0" class="perf">NA</label>
</div>

<div>
<label><input type="radio" name="sev_${index}_${i}" value="5" class="sev">5</label>
<label><input type="radio" name="sev_${index}_${i}" value="4" class="sev">4</label>
<label><input type="radio" name="sev_${index}_${i}" value="3" class="sev">3</label>
<label><input type="radio" name="sev_${index}_${i}" value="2" class="sev">2</label>
<label><input type="radio" name="sev_${index}_${i}" value="1" class="sev">1</label>
</div>

<div>
<textarea placeholder="Comment..."></textarea>
</div>

</div>

<div class="root">
<textarea placeholder="Root cause required for LTE or DTE"></textarea>
</div>

</div>
`;
});

block+=`
<div class="grade-line">
Competency Grade: <span class="compGrade">—</span>
</div>
</div>
`;

container.innerHTML+=block;

});

}

function calculate(){

let override=document.getElementById("override");
let overall=document.getElementById("overallGrade");

let allCompGrades=[];
let severities=[];

document.querySelectorAll(".sev:checked").forEach(el=>{
    severities.push(parseInt(el.value));
});

if(severities.length){

let lowest=Math.min(...severities);

if(lowest===1){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to DTE (Outcome Triggered)";
overall.textContent="1";
overall.className="red";
return;
}

if(lowest===2){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to LTE (Outcome Triggered)";
overall.textContent="2";
overall.className="orange";
return;
}
}

override.style.display="none";
overall.className="";

document.querySelectorAll(".comp").forEach(compBlock=>{

let total=0;
let weightTotal=0;

compBlock.querySelectorAll(".row").forEach(row=>{
let weight=parseFloat(row.dataset.weight);
let perf=row.querySelector(".perf:checked");
if(perf && perf.value!=="0"){
total+=parseInt(perf.value)*weight;
weightTotal+=weight;
}
});

let gradeSpan=compBlock.querySelector(".compGrade");

if(weightTotal){
let avg=total/weightTotal;
let grade=band(avg);
gradeSpan.textContent=grade;
allCompGrades.push(grade);
}else{
gradeSpan.textContent="—";
}

});

if(allCompGrades.length){
let overallAvg=allCompGrades.reduce((a,b)=>a+b)/allCompGrades.length;
overall.textContent=Math.round(overallAvg);
}else{
overall.textContent="—";
}

}

document.addEventListener("change",function(e){

if(e.target.classList.contains("sev")){
let row=e.target.closest(".row");
let root=row.querySelector(".root");
if(parseInt(e.target.value)<=2){
root.style.display="block";
}else{
root.style.display="none";
}
}

calculate();

});

build();

</script>
</body>
</html>
