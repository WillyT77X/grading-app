<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grading App</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f4f6f8;
    margin:20px;
}

h2{margin-bottom:20px;}

.comp{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr auto auto 1.4fr;
    gap:18px;
    align-items:start;
}

.grid > div:first-child{
    white-space: normal;
    word-break: break-word;
}

.header{
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
    margin-bottom:12px;
}

.row{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.row:last-child{border-bottom:none;}

textarea{
    width:100%;
    min-height:44px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.root{
    display:none;
    margin-top:8px;
}

input[type="radio"]{
    transform:scale(1.15);
    margin-right:4px;
}

.override{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-weight:600;
    margin-bottom:15px;
    display:none;
}

.grade-line{
    font-weight:bold;
    margin-top:15px;
}

.overall{
    font-size:22px;
    font-weight:bold;
    margin-top:25px;
}

.red{color:#b30000;}
.orange{color:#cc5500;}

</style>
</head>
<body>

<h2>Grading App</h2>

<div id="override" class="override"></div>

<div class="comp">
<h3>Application of Procedures</h3>

<div class="grid header">
<div>Observable Behaviour</div>
<div>Grade</div>
<div>Outcome</div>
<div>Comments</div>
</div>

<div id="rows"></div>

<div class="grade-line">
Competency Grade: <span id="compGrade">—</span>
</div>

</div>

<div class="overall">
Overall Grade: <span id="overallGrade">—</span>
</div>

<script>

const weights=[7,6,5.1,4.2,3.3,2.2,1];

const obs=[
"OB 1.1 Identifies where to find procedures and regulations",
"OB 1.2 Applies relevant operating instructions and procedures correctly in a timely and accurate manner",
"OB 1.3 Follows SOPs unless safety dictates appropriate deviation",
"OB 1.4 Operates aircraft systems correctly and within approved limits",
"OB 1.5 Monitors aircraft systems effectively and detects deviations promptly",
"OB 1.6 Complies with regulatory and organisational requirements",
"OB 1.7 Applies procedural knowledge consistently under workload conditions"
];

const rowsContainer=document.getElementById("rows");

obs.forEach((text,i)=>{

rowsContainer.innerHTML+=`
<div class="row" data-weight="${weights[i]}">

<div class="grid">

<div>${text}</div>

<div>
<label><input type="radio" name="perf_${i}" value="1" class="perf">–</label>
<label><input type="radio" name="perf_${i}" value="3" class="perf">0</label>
<label><input type="radio" name="perf_${i}" value="5" class="perf">+</label>
<label><input type="radio" name="perf_${i}" value="0" class="perf">NA</label>
</div>

<div>
<label><input type="radio" name="sev_${i}" value="5" class="sev">5</label>
<label><input type="radio" name="sev_${i}" value="4" class="sev">4</label>
<label><input type="radio" name="sev_${i}" value="3" class="sev">3</label>
<label><input type="radio" name="sev_${i}" value="2" class="sev">2</label>
<label><input type="radio" name="sev_${i}" value="1" class="sev">1</label>
</div>

<div>
<textarea placeholder="Comment..."></textarea>
</div>

</div>

<div class="root">
<textarea placeholder="Root cause required for LTE or DTE"></textarea>
</div>

</div>
`;

});

function band(avg){
if(avg<=1.5) return 1;
if(avg<=2.5) return 2;
if(avg<=3.5) return 3;
if(avg<=4.5) return 4;
return 5;
}

function calculate(){

const override=document.getElementById("override");
const overall=document.getElementById("overallGrade");
const compGrade=document.getElementById("compGrade");

const severities=Array.from(document.querySelectorAll(".sev:checked"))
.map(el=>parseInt(el.value));

if(severities.length){
let lowest=Math.min(...severities);

if(lowest===1){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to DTE (Outcome Triggered)";
overall.textContent="DTE";
overall.className="red";
compGrade.textContent="DTE";
return;
}

if(lowest===2){
override.style.display="block";
override.textContent="⚠ Overall Grade adjusted to LTE (Outcome Triggered)";
overall.textContent="LTE";
overall.className="orange";
compGrade.textContent="LTE";
return;
}
}

override.style.display="none";
overall.className="";

let total=0, weightTotal=0;

document.querySelectorAll(".row").forEach(row=>{
let weight=parseFloat(row.dataset.weight);
let perf=row.querySelector(".perf:checked");
if(perf && perf.value!=="0"){
total+=parseInt(perf.value)*weight;
weightTotal+=weight;
}
});

if(weightTotal){
let avg=total/weightTotal;
let grade=band(avg);
compGrade.textContent=grade;
overall.textContent=grade;
}else{
compGrade.textContent="—";
overall.textContent="—";
}
}

document.addEventListener("change",function(e){

if(e.target.classList.contains("sev")){
let row=e.target.closest(".row");
let root=row.querySelector(".root");
if(parseInt(e.target.value)<=2){
root.style.display="block";
}else{
root.style.display="none";
}
}

calculate();
});

</script>

</body>
</html>
