<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competency Grading</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f4f6f8;
    margin:20px;
}

h2{margin-bottom:20px;}

.comp{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:35px;
}

.grid{
    display:grid;
    grid-template-columns: 1fr auto auto 1.4fr;
    gap:18px;
    align-items:start;
}

.grid > div:first-child{
    white-space: normal;
    word-break: break-word;
}

.header{
    font-weight:bold;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
    margin-bottom:12px;
}

.row{
    padding:14px 0;
    border-bottom:1px solid #eee;
}

.row:last-child{border-bottom:none;}

.row.lte{
    background:#fff3cd;
}

.row.dte{
    background:#f8d7da;
}

textarea{
    width:100%;
    min-height:44px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.root{
    display:none;
    margin-top:8px;
}

input[type="radio"]{
    transform:scale(1.15);
    margin-right:4px;
}

.override{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-weight:600;
    margin-bottom:20px;
    display:none;
}

.grade-line{
    font-weight:bold;
    margin-top:15px;
}

.overall{
    font-size:24px;
    font-weight:bold;
    margin-top:35px;
}

.pass{color:green;}
.fail{color:#b30000;}
.red{color:#b30000;}
.orange{color:#cc5500;}
</style>
</head>
<body>

<h2>Competency Grading</h2>

<div id="override" class="override"></div>
<div id="competencies"></div>

<div class="overall">
Overall Grade: <span id="overallGrade">—</span>
<br>
Result: <span id="passFail">—</span>
</div>
