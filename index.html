<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competency Grading – Instructor Mode</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    margin: 18px;
    background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

.comp {
    background:#fff;
    padding:16px;
    margin-bottom:24px;
    border-radius:10px;
    border:1px solid #e1e4e8;
}

.ob {
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.ob:last-child { border-bottom:none; }

label {
    margin-right:12px;
    font-size:16px;
}

input[type="radio"] {
    transform: scale(1.3);
    margin-right:4px;
}

.section-label {
    font-weight:600;
    margin-top:6px;
}

.root {
    display:none;
    margin-top:8px;
    width:100%;
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

.grade-line {
    font-weight:bold;
    margin-top:12px;
}

.override-banner {
    display:none;
    padding:10px;
    margin-bottom:16px;
    border-radius:8px;
    background:#fff3cd;
    color:#856404;
    font-weight:600;
}

.overall-box {
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
}

.red { color:#b30000; }
.orange { color:#cc5500; }
.green { color:#2e7d32; }

</style>
</head>
<body>

<h2>Competency Grading – Instructor Mode</h2>

<div id="overrideBanner" class="override-banner"></div>

<div id="app"></div>

<div class="overall-box">
Overall Grade: <span id="overallGrade">—</span>
</div>

<script>

// ---------------- DATA ----------------

const competencies = [

{
id:"knowledge",
title:"Knowledge",
weights:[7,6,5,4,3,2,1],
obs:[
"OB 0.1 Demonstrates practical knowledge",
"OB 0.2 Demonstrates required knowledge",
"OB 0.3 Demonstrates environment knowledge",
"OB 0.4 Demonstrates legislation knowledge",
"OB 0.5 Sources information correctly",
"OB 0.6 Shows learning interest",
"OB 0.7 Applies knowledge effectively"
]
},

{
id:"communication",
title:"Communication",
weights:[10,9.6,9.1,8.5,7.8,7,6,4.8,3,1],
obs:[
"OB 2.1 Determines readiness",
"OB 2.2 Selects timing",
"OB 2.3 Conveys clearly",
"OB 2.4 Confirms understanding",
"OB 2.5 Listens actively",
"OB 2.6 Asks effective questions",
"OB 2.7 Escalates appropriately",
"OB 2.8 Uses non-verbal cues",
"OB 2.9 Uses phraseology",
"OB 2.10 Handles datalink"
]
},

{
id:"automation",
title:"Automation",
weights:[6,5.2,4.5,3.7,2.6,1.4],
obs:[
"OB 3.1 Uses automation correctly",
"OB 3.2 Detects deviations",
"OB 3.3 Manages flight path",
"OB 3.4 Maintains control under load",
"OB 3.5 Selects appropriate mode",
"OB 3.6 Monitors transitions"
]
},

{
id:"handling",
title:"Aircraft Handling",
weights:[7,6.2,5.4,4.6,3.6,2.4,1.2],
obs:[
"OB 4.1 Controls aircraft accurately",
"OB 4.2 Detects deviations",
"OB 4.3 Manually controls aircraft",
"OB 4.4 Manages flight path safely",
"OB 4.5 Maintains path under distraction",
"OB 4.6 Uses guidance systems",
"OB 4.7 Monitors guidance systems"
]
},

{
id:"leadership",
title:"Leadership & Teamwork",
weights:[11,9.8,8.8,7.6,6.5,5.3,4.2,3.1,2.2,1.5,1],
obs:[
"OB 5.1 Encourages participation",
"OB 5.2 Shows initiative",
"OB 5.3 Engages in planning",
"OB 5.4 Considers team input",
"OB 5.5 Exchanges feedback",
"OB 5.6 Resolves conflict",
"OB 5.7 Demonstrates leadership",
"OB 5.8 Accepts responsibility",
"OB 5.9 Carries out instructions",
"OB 5.10 Applies intervention",
"OB 5.11 Manages cultural challenges"
]
},

{
id:"decision",
title:"Decision Making",
weights:[9,8.2,7.4,6.5,5.5,4.3,3,1.8,1],
obs:[
"OB 6.1 Manages threats",
"OB 6.2 Seeks accurate info",
"OB 6.3 Identifies causes",
"OB 6.4 Perseveres safely",
"OB 6.5 Considers options",
"OB 6.6 Applies techniques",
"OB 6.7 Reviews decisions",
"OB 6.8 Adapts independently",
"OB 6.9 Shows resilience"
]
},

{
id:"workload",
title:"Workload Management",
weights:[9,8,7.2,6.3,5.4,4.5,3.2,2,1],
obs:[
"OB 8.1 Exercises self-control",
"OB 8.2 Plans effectively",
"OB 8.3 Manages time",
"OB 8.4 Offers assistance",
"OB 8.5 Delegates tasks",
"OB 8.6 Seeks assistance",
"OB 8.7 Cross-checks actions",
"OB 8.8 Verifies completion",
"OB 8.9 Manages interruptions"
]
},

{
id:"situational",
title:"Situational Awareness",
weights:[8,7.1,6.2,5.3,4.2,3.1,2,1],
obs:[
"OB 7.1 Monitors aircraft state",
"OB 7.2 Monitors energy state",
"OB 7.3 Assesses environment",
"OB 7.4 Validates info",
"OB 7.5 Maintains awareness",
"OB 7.6 Develops contingencies",
"OB 7.7 Responds to reduction",
"OB 7.8 Anticipates change"
]
},

{
id:"procedures",
title:"Procedures & Compliance",
weights:[7,6,5.1,4.2,3.3,2.2,1],
obs:[
"OB 1.1 Identifies procedures",
"OB 1.2 Applies procedures",
"OB 1.3 Follows SOPs",
"OB 1.4 Operates systems",
"OB 1.5 Monitors systems",
"OB 1.6 Complies with regulations",
"OB 1.7 Applies procedural knowledge"
]
}

];

// ---------------- RENDER ----------------

const app = document.getElementById("app");

competencies.forEach(comp=>{
let html = `<div class="comp"><h3>${comp.title}</h3>`;

comp.obs.forEach((ob,i)=>{
html += `
<div class="ob">
<div><strong>${ob}</strong></div>

<div class="section-label">Performance</div>
<label><input type="radio" name="${comp.id}_perf_${i}" value="1" class="perf"> -</label>
<label><input type="radio" name="${comp.id}_perf_${i}" value="3" class="perf"> 0</label>
<label><input type="radio" name="${comp.id}_perf_${i}" value="5" class="perf"> +</label>

<div class="section-label">Severity</div>
<label><input type="radio" name="${comp.id}_sev_${i}" value="5" class="sev"> HE</label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="4" class="sev"> E</label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="3" class="sev"> ME</label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="2" class="sev"> LTE</label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="1" class="sev"> DTE</label>

<textarea class="root" placeholder="Root cause required for LTE or DTE"></textarea>
</div>
`;
});

html += `<div class="grade-line">Competency Grade: <span id="${comp.id}_grade">—</span></div></div>`;
app.innerHTML += html;
});

// ---------------- LOGIC ----------------

function band(avg){
if(avg<=1.5) return 1;
if(avg<=2.5) return 2;
if(avg<=3.5) return 3;
if(avg<=4.5) return 4;
return 5;
}

function calculate(){

const banner = document.getElementById("overrideBanner");
const overall = document.getElementById("overallGrade");

const severities = Array.from(document.querySelectorAll(".sev:checked"))
.map(el=>parseInt(el.value));

if(severities.length){
let lowest = Math.min(...severities);

if(lowest===1){
banner.style.display="block";
banner.textContent="⚠ Overall Grade adjusted to DTE (Severity Triggered)";
overall.textContent="DTE";
overall.className="red";
return;
}

if(lowest===2){
banner.style.display="block";
banner.textContent="⚠ Overall Grade adjusted to LTE (Severity Triggered)";
overall.textContent="LTE";
overall.className="orange";
return;
}
}

banner.style.display="none";
overall.className="";

let compGrades=[];

competencies.forEach(comp=>{
let total=0, weightTotal=0;

comp.obs.forEach((_,i)=>{
let sel=document.querySelector(`input[name="${comp.id}_perf_${i}"]:checked`);
if(sel){
let score=parseInt(sel.value);
let weight=comp.weights[i];
total+=score*weight;
weightTotal+=weight;
}
});

if(weightTotal){
let avg=total/weightTotal;
let g=band(avg);
document.getElementById(`${comp.id}_grade`).textContent=g;
compGrades.push(avg);
}else{
document.getElementById(`${comp.id}_grade`).textContent="—";
}
});

if(compGrades.length){
let overallAvg=compGrades.reduce((a,b)=>a+b,0)/compGrades.length;
overall.textContent=band(overallAvg);
}else{
overall.textContent="—";
}
}

document.addEventListener("change",function(e){

if(e.target.classList.contains("sev")){
let val=parseInt(e.target.value);
let root=e.target.closest(".ob").querySelector(".root");
if(val<=2){
root.style.display="block";
root.required=true;
}else{
root.style.display="none";
root.required=false;
}
}

calculate();
});

</script>
</body>
</html>
