<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competency Grading – Professional Engine</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f4f6f9;
  margin:20px;
}

h1{margin-bottom:25px;}

.competency{
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:22px;
  border:1px solid #e5e7eb;
}

.comp-flag-1{ border-left:6px solid #c62828; }
.comp-flag-2{ border-left:6px solid #ef6c00; }

.row{
  display:grid;
  grid-template-columns:45% 20% 35%;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #f1f1f1;
}

.row:last-child{ border-bottom:none; }

.ratecell{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
}

.outcomecell{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  text-align:center;
}

.ob-low-1{ background:#ffe5e5; }
.ob-low-2{ background:#fff4e5; }

.footer{
  margin-top:12px;
  display:flex;
  gap:20px;
  font-weight:bold;
}

.root-cause{
  margin-top:8px;
  font-weight:bold;
}

textarea{
  width:100%;
  margin-top:5px;
  height:70px;
  border-radius:6px;
  border:1px solid #ccc;
  padding:6px;
}

.overall{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-top:30px;
  border:2px solid #e5e7eb;
}

.overall-status{
  margin-top:15px;
  padding:12px;
  font-weight:bold;
  border-radius:8px;
}

.status-pass{ background:#e6f4ea; color:#2e7d32; }
.status-fail{ background:#fdecea; color:#c62828; }
.status-warning{ background:#fff8e1; color:#ef6c00; }
</style>
</head>
<body>

<h1>Competency Grading – Professional Engine</h1>

<div id="app"></div>

<div class="overall">
  <div><strong>Overall Avg:</strong> <span id="overallAvg">—</span></div>
  <div><strong>Overall Grade:</strong> <span id="overallGrade">—</span></div>
  <div id="overallStatus" class="overall-status"></div>

  <div style="margin-top:15px;">
    <strong>Overall Assessment Notes:</strong>
    <textarea id="overallNotes"></textarea>
  </div>
</div>

<script>

/* =============================
   FULL DATASET – ALL 9
============================= */

const DATA = [
{ id:"knowledge", title:"Knowledge", weights:[7,6,5,4,3,2,1], obs:[
"OB 0.1 Demonstrates practical knowledge",
"OB 0.2 Demonstrates required knowledge",
"OB 0.3 Demonstrates environment knowledge",
"OB 0.4 Demonstrates legislation knowledge",
"OB 0.5 Sources information",
"OB 0.6 Shows learning interest",
"OB 0.7 Applies knowledge effectively"
]},
{ id:"communication", title:"Communication", weights:[10,9.6,9.1,8.5,7.8,7,6,4.8,3,1], obs:[
"OB 2.1 Ensures recipient ready",
"OB 2.2 Selects appropriate communication",
"OB 2.3 Conveys clearly",
"OB 2.4 Confirms understanding",
"OB 2.5 Listens actively",
"OB 2.6 Asks effective questions",
"OB 2.7 Uses escalation",
"OB 2.8 Uses non-verbal cues",
"OB 2.9 Uses phraseology",
"OB 2.10 Responds to datalink"
]},
{ id:"automation", title:"Automation Management", weights:[6,5.2,4.5,3.7,2.6,1.4], obs:[
"Uses automation correctly","Detects deviations","Manages path","Maintains under workload","Selects automation level","Monitors transitions"
]},
{ id:"handling", title:"Aircraft Handling", weights:[7,6.2,5.4,4.6,3.6,2.4,1.2], obs:[
"Controls aircraft","Detects deviations","Manages attitude","Optimises performance","Maintains path","Uses guidance","Monitors guidance"
]},
{ id:"leadership", title:"Leadership & Teamwork", weights:[11,9.8,8.8,7.6,6.5,5.3,4.2,3.1,2.2,1.5,1], obs:[
"Encourages participation","Shows initiative","Engages planning","Considers input","Constructive feedback","Resolves conflict","Exercises leadership","Accepts responsibility","Carries instructions","Applies intervention","Manages culture"
]},
{ id:"decision", title:"Decision Making", weights:[9,8.2,7.4,6.5,5.5,4.3,3,1.8,1], obs:[
"Identifies threats","Seeks info","Identifies causes","Perseveres safely","Considers options","Applies techniques","Adapts decisions","Handles no-guidance","Shows resilience"
]},
{ id:"workload", title:"Workload Management", weights:[9,8,7.2,6.3,5.4,4.5,3.2,2,1], obs:[
"Self-control","Plans effectively","Manages time","Offers help","Delegates","Accepts help","Cross-checks","Verifies completion","Recovers interruptions"
]},
{ id:"situational", title:"Situational Awareness", weights:[8,7.1,6.2,5.3,4.2,3.1,2,1], obs:[
"Monitors aircraft","Monitors energy","Assesses environment","Validates info","Maintains awareness","Plans contingencies","Responds to reduction","Anticipates change"
]},
{ id:"procedures", title:"Application of Procedures", weights:[7,6,5.1,4.2,3.3,2.2,1], obs:[
"Finds procedures","Applies instructions","Follows SOPs","Operates systems","Monitors systems","Complies regulations","Applies procedural knowledge"
]}
];

/* =============================
   RENDER
============================= */

const app=document.getElementById("app");

DATA.forEach(comp=>{
  const section=document.createElement("div");
  section.className="competency";
  section.id=comp.id;

  let html=`<h2>${comp.title}</h2>`;

  comp.obs.forEach((text,i)=>{
    html+=`
    <div class="row" data-weight="${comp.weights[i]}">
      <div>${text}</div>

      <div class="ratecell">
        <label><input type="radio" name="${comp.id}_g_${i}" value="1">−</label>
        <label><input type="radio" name="${comp.id}_g_${i}" value="3">0</label>
        <label><input type="radio" name="${comp.id}_g_${i}" value="5">+</label>
        <label><input type="radio" name="${comp.id}_g_${i}" value="0">NA</label>
      </div>

      <div class="outcomecell">
        <label><input type="radio" name="${comp.id}_o_${i}" value="5">HE</label>
        <label><input type="radio" name="${comp.id}_o_${i}" value="4">E</label>
        <label><input type="radio" name="${comp.id}_o_${i}" value="3">ME</label>
        <label><input type="radio" name="${comp.id}_o_${i}" value="2">LTE</label>
        <label><input type="radio" name="${comp.id}_o_${i}" value="1">DTE</label>
      </div>
    </div>
    `;
  });

  html+=`
  <div class="footer">
    Avg: <span class="avg-display">—</span>
    Grade: <span class="grade-display">—</span>
    Outcome Summary: <span class="outcome-summary">—</span>
  </div>

  <div class="root-cause">
    Root Cause: <span class="root-display">No</span>
  </div>

  <div style="margin-top:10px;">
    <strong>Competency Notes:</strong>
    <textarea></textarea>
  </div>
  `;

  section.innerHTML=html;
  app.appendChild(section);
});

/* =============================
   ENGINE
============================= */

function getGrade(avg){
  if(avg>=4.5) return 5;
  if(avg>=3.5) return 4;
  if(avg>=2.5) return 3;
  if(avg>=1.5) return 2;
  return 1;
}

function recompute(){

  let allScores=[];
  let totalSum=0;
  let totalWeights=0;

  DATA.forEach(comp=>{

    const compEl=document.getElementById(comp.id);
    const rows=compEl.querySelectorAll(".row");

    let compSum=0;
    let compWeights=0;
    let worstOutcome=5;
    let rootCause=false;

    rows.forEach((row,i)=>{

      row.classList.remove("ob-low-1","ob-low-2");

      const gradeSel=row.querySelector(`input[name="${comp.id}_g_${i}"]:checked`);
      const outcomeSel=row.querySelector(`input[name="${comp.id}_o_${i}"]:checked`);

      if(outcomeSel){
        const oVal=parseInt(outcomeSel.value);
        if(oVal<worstOutcome) worstOutcome=oVal;

        if(oVal<=2){
          row.classList.add(oVal===1?"ob-low-1":"ob-low-2");
          rootCause=true;
        }
      }

      if(gradeSel){
        const val=parseInt(gradeSel.value);
        if(val>0){
          const weight=comp.weights[i];
          compSum+=val*weight;
          compWeights+=weight;
          totalSum+=val*weight;
          totalWeights+=weight;
          allScores.push(val);
        }
      }

    });

    const avg=compWeights>0?compSum/compWeights:0;
    const grade=getGrade(avg);

    compEl.querySelector(".avg-display").textContent=avg?avg.toFixed(2):"—";
    compEl.querySelector(".grade-display").textContent=avg?grade:"—";

    const outcomeText =
      worstOutcome===5?"HE":
      worstOutcome===4?"E":
      worstOutcome===3?"ME":
      worstOutcome===2?"LTE":
      worstOutcome===1?"DTE":"—";

    compEl.querySelector(".outcome-summary").textContent=outcomeText;
    compEl.querySelector(".root-display").textContent=rootCause?"YES":"No";

    compEl.classList.remove("comp-flag-1","comp-flag-2");
    if(rootCause) compEl.classList.add("comp-flag-2");

  });

  const overallAvg=totalWeights>0?totalSum/totalWeights:0;
  const overallGrade=getGrade(overallAvg);

  document.getElementById("overallAvg").textContent=overallAvg?overallAvg.toFixed(2):"—";
  document.getElementById("overallGrade").textContent=overallAvg?overallGrade:"—";

  evaluateOverall(overallAvg,allScores);
}

function evaluateOverall(avg,scores){

  const statusEl=document.getElementById("overallStatus");

  const count1=scores.filter(s=>s===1).length;
  const count2=scores.filter(s=>s===2).length;

  let status="";
  let className="";

  if(count1>0){
    status="FAIL — Critical Level 1";
    className="status-fail";
  }
  else if(count2>2){
    status="FAIL — Excessive Level 2";
    className="status-fail";
  }
  else if(avg<3.0){
    status="FAIL — Overall Below Standard";
    className="status-fail";
  }
  else if(count2>0){
    status="PASS WITH DEVIATIONS";
    className="status-warning";
  }
  else{
    status="PASS — Standard Achieved";
    className="status-pass";
  }

  statusEl.className="overall-status "+className;
  statusEl.textContent=status;
}

document.addEventListener("change",e=>{
  if(e.target.type==="radio") recompute();
});

recompute();

</script>
</body>
</html>
