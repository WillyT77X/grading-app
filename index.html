<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competency Grading – Professional Engine</title>

<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f6f7f9; }
.comp { background:#fff; padding:15px; margin-bottom:25px; border-radius:8px; border:1px solid #ddd; }
.ob { border-bottom:1px solid #eee; padding:10px 0; }
.section-label { font-weight:bold; margin-top:6px; font-size:14px; }
.override-banner {
    display:none;
    padding:12px;
    background:#ffe0e0;
    color:#a10000;
    font-weight:bold;
    margin-bottom:20px;
    border-radius:6px;
}
.overall-box {
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}
.red { color:#b30000; }
.orange { color:#cc5500; }
textarea { width:100%; margin-top:5px; }
.grade-box { font-weight:bold; margin-top:10px; }
</style>
</head>
<body>

<h2>Competency Grading – Professional Engine</h2>

<div id="overrideBanner" class="override-banner"></div>
<div id="app"></div>

<div class="overall-box">
Overall Grade: <span id="overallGrade">—</span>
</div>

<script>

// ---------------- DATA ----------------

const competencies = [

{
id:"knowledge",
title:"Knowledge",
weights:[7,6,5,4,3,2,1],
obs:[
"OB 0.1 Demonstrates practical and applicable knowledge",
"OB 0.2 Demonstrates required knowledge of instructions",
"OB 0.3 Demonstrates knowledge of environment and infrastructure",
"OB 0.4 Demonstrates knowledge of legislation",
"OB 0.5 Knows where to source information",
"OB 0.6 Shows interest in acquiring knowledge",
"OB 0.7 Applies knowledge effectively"
]
},

{
id:"communication",
title:"Communication",
weights:[10,9.6,9.1,8.5,7.8,7,6,4.8,3,1],
obs:[
"OB 2.1 Determines readiness",
"OB 2.2 Selects communication timing",
"OB 2.3 Conveys clearly and concisely",
"OB 2.4 Confirms understanding",
"OB 2.5 Listens actively",
"OB 2.6 Asks effective questions",
"OB 2.7 Escalates appropriately",
"OB 2.8 Uses non-verbal communication",
"OB 2.9 Uses standard phraseology",
"OB 2.10 Handles datalink correctly"
]
},

{
id:"automation",
title:"Automation Management",
weights:[6,5.2,4.5,3.7,2.6,1.4],
obs:[
"OB 3.1 Uses automation appropriately",
"OB 3.2 Detects deviations",
"OB 3.3 Manages flight path performance",
"OB 3.4 Maintains path during workload",
"OB 3.5 Selects correct automation mode",
"OB 3.6 Monitors automation transitions"
]
},

{
id:"handling",
title:"Aircraft Handling",
weights:[7,6.2,5.4,4.6,3.6,2.4,1.2],
obs:[
"OB 4.1 Controls aircraft accurately",
"OB 4.2 Detects deviations",
"OB 4.3 Manually controls aircraft effectively",
"OB 4.4 Manages flight path safely",
"OB 4.5 Maintains path during distractions",
"OB 4.6 Uses flight guidance systems",
"OB 4.7 Monitors guidance systems"
]
},

{
id:"leadership",
title:"Leadership & Teamwork",
weights:[11,9.8,8.8,7.6,6.5,5.3,4.2,3.1,2.2,1.5,1],
obs:[
"OB 5.1 Encourages participation",
"OB 5.2 Demonstrates initiative",
"OB 5.3 Engages in planning",
"OB 5.4 Considers team input",
"OB 5.5 Gives and receives feedback",
"OB 5.6 Resolves conflict constructively",
"OB 5.7 Exercises decisive leadership",
"OB 5.8 Accepts responsibility",
"OB 5.9 Carries out instructions",
"OB 5.10 Applies intervention strategies",
"OB 5.11 Manages cultural challenges"
]
},

{
id:"decision",
title:"Decision Making",
weights:[9,8.2,7.4,6.5,5.5,4.3,3,1.8,1],
obs:[
"OB 6.1 Manages threats and errors",
"OB 6.2 Seeks accurate information",
"OB 6.3 Identifies root causes",
"OB 6.4 Perseveres safely",
"OB 6.5 Considers options",
"OB 6.6 Applies decision techniques",
"OB 6.7 Reviews and adapts decisions",
"OB 6.8 Adapts without guidance",
"OB 6.9 Demonstrates resilience"
]
},

{
id:"workload",
title:"Workload & Task Management",
weights:[9,8,7.2,6.3,5.4,4.5,3.2,2,1],
obs:[
"OB 8.1 Exercises self-control",
"OB 8.2 Plans and prioritises",
"OB 8.3 Manages time efficiently",
"OB 8.4 Offers assistance",
"OB 8.5 Delegates tasks",
"OB 8.6 Seeks assistance",
"OB 8.7 Cross-checks actions",
"OB 8.8 Verifies completion",
"OB 8.9 Manages interruptions"
]
},

{
id:"situational",
title:"Situational Awareness",
weights:[8,7.1,6.2,5.3,4.2,3.1,2,1],
obs:[
"OB 7.1 Monitors aircraft state",
"OB 7.2 Monitors energy state",
"OB 7.3 Assesses environment",
"OB 7.4 Validates information",
"OB 7.5 Maintains team awareness",
"OB 7.6 Develops contingencies",
"OB 7.7 Responds to reduced awareness",
"OB 7.8 Anticipates change"
]
},

{
id:"procedures",
title:"Procedures & Compliance",
weights:[7,6,5.1,4.2,3.3,2.2,1],
obs:[
"OB 1.1 Identifies procedures",
"OB 1.2 Applies procedures",
"OB 1.3 Follows SOPs",
"OB 1.4 Operates systems correctly",
"OB 1.5 Monitors systems",
"OB 1.6 Complies with regulations",
"OB 1.7 Applies procedural knowledge"
]
}

];

// ---------------- RENDER ----------------

const app = document.getElementById("app");

competencies.forEach(comp=>{
let html = `<div class="comp"><h3>${comp.title}</h3>`;

comp.obs.forEach((ob,i)=>{
html += `
<div class="ob">
<div><strong>${ob}</strong></div>

<div class="section-label">Performance</div>
<label><input type="radio" name="${comp.id}_perf_${i}" value="1" class="perf"> - </label>
<label><input type="radio" name="${comp.id}_perf_${i}" value="3" class="perf"> 0 </label>
<label><input type="radio" name="${comp.id}_perf_${i}" value="5" class="perf"> + </label>

<div class="section-label">Event Severity</div>
<label><input type="radio" name="${comp.id}_sev_${i}" value="5" class="sev"> HE </label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="4" class="sev"> E </label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="3" class="sev"> ME </label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="2" class="sev"> LTE </label>
<label><input type="radio" name="${comp.id}_sev_${i}" value="1" class="sev"> DTE </label>

<div class="section-label">Root Cause (Required if LTE or DTE)</div>
<textarea class="root"></textarea>
</div>
`;
});

html += `<div class="grade-box">Competency Grade: <span id="${comp.id}_grade">—</span></div></div>`;
app.innerHTML += html;
});

// ---------------- LOGIC ----------------

function band(avg){
if(avg<=1.5) return 1;
if(avg<=2.5) return 2;
if(avg<=3.5) return 3;
if(avg<=4.5) return 4;
return 5;
}

function calculate(){

const banner = document.getElementById("overrideBanner");
const overall = document.getElementById("overallGrade");

const severities = Array.from(document.querySelectorAll(".sev:checked"))
.map(el=>parseInt(el.value));

if(severities.length>0){
let lowest = Math.min(...severities);

if(lowest===1){
banner.style.display="block";
banner.textContent="Safety Override Active – Overall Grade Forced to DTE";
overall.textContent="DTE";
overall.className="red";
return;
}

if(lowest===2){
banner.style.display="block";
banner.textContent="Safety Override Active – Overall Grade Forced to LTE";
overall.textContent="LTE";
overall.className="orange";
return;
}
}

banner.style.display="none";
overall.className="";

let compGrades = [];

competencies.forEach(comp=>{
let total=0;
let weightTotal=0;

comp.obs.forEach((_,i)=>{
let sel = document.querySelector(`input[name="${comp.id}_perf_${i}"]:checked`);
if(sel){
let score = parseInt(sel.value);
let weight = comp.weights[i];
total += score*weight;
weightTotal += weight;
}
});

if(weightTotal>0){
let avg = total/weightTotal;
let g = band(avg);
document.getElementById(`${comp.id}_grade`).textContent = g;
compGrades.push(avg);
}else{
document.getElementById(`${comp.id}_grade`).textContent="—";
}
});

if(compGrades.length>0){
let overallAvg = compGrades.reduce((a,b)=>a+b,0)/compGrades.length;
overall.textContent = band(overallAvg);
}else{
overall.textContent="—";
}

}

document.addEventListener("change",function(e){

if(e.target.classList.contains("sev")){
let val = parseInt(e.target.value);
let root = e.target.closest(".ob").querySelector(".root");
if(val<=2){
root.required=true;
root.style.border="2px solid red";
}else{
root.required=false;
root.style.border="";
}
}

calculate();

});

</script>
</body>
</html>
